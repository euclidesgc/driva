name: driva_editor
description: Editor web do driva — monta páginas Server-Driven UI como spec JSON, com preview fiel via sdui_flutter.
publish_to: none
version: 0.4.0
resolution: workspace

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  bloc: ^9.0.0
  dio: ^5.7.0
  equatable: ^2.0.7
  flutter_bloc: ^9.1.0
  fpdart: ^1.1.1
  get_it: ^8.0.3
  go_router: ^16.0.0
  sdui_core: ^0.3.0
  sdui_flutter: ^0.3.0
  zard: ^1.3.0
  shared_preferences: ^2.5.5
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_driver:
    sdk: flutter
  bloc_test: ^10.0.0
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  fonts:
    - family: Public Sans
      fonts:
        - asset: fonts/public_sans/PublicSans-Regular.ttf
        - asset: fonts/public_sans/PublicSans-Medium.ttf
          weight: 500
        - asset: fonts/public_sans/PublicSans-SemiBold.ttf
          weight: 600
        - asset: fonts/public_sans/PublicSans-Bold.ttf
          weight: 700
    - family: Space Grotesk
      fonts:
        - asset: fonts/space_grotesk/SpaceGrotesk-Medium.ttf
          weight: 500
        - asset: fonts/space_grotesk/SpaceGrotesk-Bold.ttf
          weight: 700
