server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json application/wasm image/svg+xml;
  gzip_min_length 1024;

  # Assets versionados do Flutter (hash no nome) — cache longo e imutável.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Entrypoint e service worker nunca cacheiam (senão o app fica preso numa versão).
  location = /index.html {
    add_header Cache-Control "no-cache";
  }
  location = /flutter_service_worker.js {
    add_header Cache-Control "no-cache";
  }

  # SPA fallback: rotas do go_router resolvem no cliente.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
