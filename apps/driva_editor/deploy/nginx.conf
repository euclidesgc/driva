server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json application/wasm image/svg+xml;
  gzip_min_length 1024;

  # Entry HTML: precisa revalidar em toda abertura/refresh para descobrir
  # builds novas. O fallback SPA em / tambem herda esta politica.
  location = /index.html {
    add_header Cache-Control "no-cache, max-age=0, must-revalidate" always;
    try_files $uri =404;
  }

  # Service worker legado: a build atual usa --pwa-strategy=none e o bootstrap
  # tambem desregistra SWs antigos. Este arquivo nunca pode ficar preso em cache.
  location = /flutter_service_worker.js {
    add_header Cache-Control "no-store, max-age=0" always;
    try_files $uri =404;
  }

  # Scripts/wasm/json do Flutter nao sao fingerprintados de forma consistente
  # (ex.: main.dart.js, flutter_bootstrap.js), entao devem revalidar sempre.
  location ~* \.(?:js|mjs|wasm|json)$ {
    add_header Cache-Control "no-cache, max-age=0, must-revalidate" always;
    try_files $uri =404;
  }

  # Midia/fontes podem ter cache curto, mas nao imutavel: varios assets do
  # Flutter mantem o mesmo nome entre builds.
  location ~* \.(?:png|jpg|jpeg|gif|svg|webp|ico|css|eot|otf|ttf|ttc|woff|woff2)$ {
    add_header Cache-Control "public, max-age=3600" always;
    try_files $uri =404;
  }

  # Assets do Flutter: mantem fallback 404 explicito para arquivos inexistentes.
  location /assets/ {
    try_files $uri =404;
  }

  # SPA fallback: rotas do go_router resolvem no cliente.
  location / {
    add_header Cache-Control "no-cache, max-age=0, must-revalidate" always;
    try_files $uri $uri/ /index.html;
  }
}
